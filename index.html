<script>
  async function getAndRenderReport() {
    const debugDiv = document.getElementById("debug");

    try {
      const response = await fetch('/api/getEmbedToken');
      
      if (!response.ok) {
        const errorText = await response.text();
        debugDiv.innerText = `Error:\nHTTP ${response.status}:\n${errorText}`;
        return;
      }

      const data = await response.json();
      debugDiv.innerText = `✅ Embed Token:\n${JSON.stringify(data, null, 2)}`;

      // Load Power BI report
      const models = window['powerbi-client'].models;
      const embedConfig = {
        type: 'report',
        id: data.reportId,
        embedUrl: data.embedUrl,
        accessToken: data.embedToken,
        tokenType: models.TokenType.Embed,
        settings: {
          panes: { filters: { visible: false }, pageNavigation: { visible: true } },
        }
      };

      const reportContainer = document.getElementById('reportContainer');
      powerbi.embed(reportContainer, embedConfig);

    } catch (e) {
      debugDiv.innerText = `Exception:\n${e.stack || e.message}`;
    }
  }

  window.onload = getAndRenderReport;
</script>

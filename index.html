
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Power BI Embedded</title>
  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.18.8/dist/powerbi.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #embedContainer { height: 600px; border: 1px solid #ccc; margin-top: 20px; }
    #debugOutput { white-space: pre-wrap; background: #f5f5f5; padding: 10px; border: 1px dashed #aaa; margin-top: 20px; }
  </style>
</head>
<body>
  <h2>Power BI Embedded Report</h2>
  <div id="embedContainer"></div>
  <h3>Debug Output</h3>
  <div id="debugOutput">Loading...</div>

  <script>
    async function loadReport() {
      const response = await fetch('/api/getEmbedToken');
      const data = await response.json();

      document.getElementById('debugOutput').textContent = JSON.stringify(data, null, 2);

      const models = window['powerbi-client'].models;
      const embedConfig = {
        type: 'report',
        tokenType: models.TokenType.Embed,
        accessToken: data.accessToken,
        embedUrl: data.embedUrl,
        id: data.reportId,
        settings: {
          panes: { filters: { visible: false }, pageNavigation: { visible: true } }
        }
      };

      const reportContainer = document.getElementById('embedContainer');
      powerbi.embed(reportContainer, embedConfig);
    }

    loadReport().catch(error => {
      document.getElementById('debugOutput').textContent = 'Error: ' + error;
    });
  </script>
</body>
</html>

<script>
  async function fetchEmbedToken() {
    try {
      const response = await fetch('/api/getEmbedToken');
      if (!response.ok) {
        const errorText = await response.text();
        throw new Error('HTTP ' + response.status + ': ' + errorText);
      }

      const data = await response.json();
      console.log("Token Response:", data);

      document.getElementById('debug').innerText = JSON.stringify(data, null, 2);
      document.getElementById('accessToken').innerText = data.accessToken;

      const embedUrl = `https://app.powerbi.com/reportEmbed?reportId=${data.reportId}&groupId=${data.workspaceId}&autoAuth=true&ctid=${data.tenantId}`;
      
      // Embed report
      document.getElementById('reportContainer').innerHTML = `
        <iframe width="100%" height="600px" frameborder="0"
          src="${embedUrl}&embedToken=${data.accessToken}">
        </iframe>
      `;
    } catch (err) {
      document.getElementById('debug').innerText = 'Error:\n' + err;
    }
  }

  fetchEmbedToken();
</script>
